<svg viewBox="0 0 1400 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient backgrounds -->
  <defs>
    <linearGradient id="eveningSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#FFD93D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8DADC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#228B22;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1400" height="420" fill="url(#eveningSky)"/>
  
  <!-- Sun/Moon -->
  <circle cx="1100" cy="100" r="70" fill="#FFD700" opacity="0.8"/>
  <circle cx="1100" cy="100" r="80" fill="#FFD700" opacity="0.2"/>
  
  <!-- Clouds -->
  <ellipse cx="200" cy="80" rx="90" ry="50" fill="white" opacity="0.8"/>
  <ellipse cx="280" cy="100" rx="100" ry="55" fill="white" opacity="0.8"/>
  <ellipse cx="130" cy="120" rx="80" ry="45" fill="white" opacity="0.6"/>
  
  <ellipse cx="800" cy="150" rx="110" ry="60" fill="#FFB6C1" opacity="0.7"/>
  <ellipse cx="900" cy="170" rx="120" ry="65" fill="#FFB6C1" opacity="0.7"/>
  
  <!-- Ground -->
  <rect y="420" width="1400" height="280" fill="url(#groundDark)"/>
  
  <!-- Railway Tracks - perspective -->
  <line x1="300" y1="420" x2="100" y2="550" stroke="#8B7355" stroke-width="20"/>
  <line x1="600" y1="420" x2="400" y2="550" stroke="#8B7355" stroke-width="20"/>
  
  <!-- Track ties with perspective -->
  <rect x="290" y="425" width="320" height="8" fill="#654321" transform="skewY(15)"/>
  <rect x="290" y="455" width="290" height="8" fill="#654321" transform="skewY(15)"/>
  <rect x="290" y="485" width="260" height="8" fill="#654321" transform="skewY(15)"/>
  <rect x="290" y="515" width="230" height="8" fill="#654321" transform="skewY(15)"/>
  <rect x="290" y="545" width="200" height="8" fill="#654321" transform="skewY(15)"/>
  
  <!-- Hills -->
  <path d="M 0,420 Q 350,200 700,420 L 700,700 L 0,700 Z" fill="#6B5B45" opacity="0.7"/>
  <path d="M 500,420 Q 900,180 1400,420 L 1400,700 L 500,700 Z" fill="#7A6B52" opacity="0.6"/>
  
  <!-- Station Building -->
  <rect x="950" y="300" width="200" height="200" fill="#DAA520"/>
  <polygon points="950,300 1050,150 1150,300" fill="#CD853F"/>
  <rect x="970" y="320" width="30" height="35" fill="#1E90FF"/>
  <rect x="1040" y="320" width="30" height="35" fill="#1E90FF"/>
  <rect x="1110" y="320" width="30" height="35" fill="#1E90FF"/>
  <rect x="970" y="370" width="30" height="35" fill="#1E90FF"/>
  <rect x="1040" y="370" width="30" height="35" fill="#1E90FF"/>
  <rect x="1110" y="370" width="30" height="35" fill="#1E90FF"/>
  
  <!-- Station Entrance -->
  <rect x="990" y="430" width="120" height="70" fill="#654321"/>
  <rect x="1010" y="450" width="40" height="50" fill="#1E90FF"/>
  <rect x="1060" y="450" width="40" height="50" fill="#1E90FF"/>
  
  <!-- Modern Bullet Train -->
  <g id="bulletTrain">
    <!-- Nose -->
    <path d="M 50,330 Q 80,320 100,350 L 100,380 Q 80,400 50,390 Z" fill="#1C1C1C"/>
    
    <!-- Engine -->
    <rect x="100" y="320" width="120" height="70" fill="#2C3E50" rx="8"/>
    <rect x="110" y="335" width="25" height="25" fill="#FFD700"/>
    <rect x="145" y="335" width="25" height="25" fill="#FFD700"/>
    
    <!-- Cabin -->
    <rect x="220" y="320" width="50" height="70" fill="#2C3E50" rx="5"/>
    <ellipse cx="245" cy="335" rx="15" ry="18" fill="#87CEEB"/>
    
    <!-- Passenger Cars -->
    <rect x="280" y="325" width="100" height="65" fill="#E74C3C" rx="4"/>
    <rect x="295" y="340" width="15" height="20" fill="#87CEEB"/>
    <rect x="320" y="340" width="15" height="20" fill="#87CEEB"/>
    <rect x="345" y="340" width="15" height="20" fill="#87CEEB"/>
    <rect x="370" y="340" width="15" height="20" fill="#87CEEB"/>
    
    <rect x="390" y="325" width="100" height="65" fill="#E74C3C" rx="4"/>
    <rect x="405" y="340" width="15" height="20" fill="#87CEEB"/>
    <rect x="430" y="340" width="15" height="20" fill="#87CEEB"/>
    <rect x="455" y="340" width="15" height="20" fill="#87CEEB"/>
    <rect x="480" y="340" width="15" height="20" fill="#87CEEB"/>
    
    <!-- Luxury Car -->
    <rect x="500" y="325" width="100" height="65" fill="#9B59B6" rx="4"/>
    <rect x="515" y="340" width="18" height="22" fill="#87CEEB"/>
    <rect x="542" y="340" width="18" height="22" fill="#87CEEB"/>
    <rect x="569" y="340" width="18" height="22" fill="#87CEEB"/>
    
    <!-- Pantograph (electrical line) -->
    <line x1="120" y1="315" x2="100" y2="260" stroke="#333" stroke-width="2"/>
    <line x1="100" y1="260" x2="140" y2="260" stroke="#333" stroke-width="2"/>
    
    <!-- Wheels -->
    <circle cx="110" cy="395" r="12" fill="#333"/>
    <circle cx="110" cy="395" r="8" fill="#666"/>
    <circle cx="160" cy="395" r="12" fill="#333"/>
    <circle cx="160" cy="395" r="8" fill="#666"/>
    
    <circle cx="320" cy="395" r="12" fill="#333"/>
    <circle cx="320" cy="395" r="8" fill="#666"/>
    <circle cx="370" cy="395" r="12" fill="#333"/>
    <circle cx="370" cy="395" r="8" fill="#666"/>
    
    <circle cx="430" cy="395" r="12" fill="#333"/>
    <circle cx="430" cy="395" r="8" fill="#666"/>
    <circle cx="480" cy="395" r="12" fill="#333"/>
    <circle cx="480" cy="395" r="8" fill="#666"/>
    
    <circle cx="540" cy="395" r="12" fill="#333"/>
    <circle cx="540" cy="395" r="8" fill="#666"/>
    <circle cx="590" cy="395" r="12" fill="#333"/>
    <circle cx="590" cy="395" r="8" fill="#666"/>
  </g>
  
  <!-- Birds -->
  <g id="flyingBird">
    <path d="M 0,0 L -3,-1 L -2,0 L -3,1 Z" fill="#333"/>
    <path d="M 0,0 L 3,-1 L 2,0 L 3,1 Z" fill="#333"/>
  </g>
  <use href="#flyingBird" x="250" y="120" transform="scale(2)"/>
  <use href="#flyingBird" x="550" y="100" transform="scale(2.5)"/>
  <use href="#flyingBird" x="1000" y="140" transform="scale(2)"/>
</svg>