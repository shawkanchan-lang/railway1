<svg viewBox="0 0 300 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Left Side Decorative Panel -->
  <defs>
    <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="800" fill="url(#leftGrad)"/>
  
  <!-- Decorative Train Elements -->
  <!-- Train Track Lines -->
  <line x1="50" y1="100" x2="250" y2="100" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="150" x2="250" y2="150" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="200" x2="250" y2="200" stroke="#FFD700" stroke-width="2" opacity="0.5"/>
  
  <!-- Train Silhouette -->
  <g opacity="0.6">
    <rect x="60" y="120" width="50" height="30" fill="#E74C3C" rx="3"/>
    <rect x="120" y="120" width="50" height="30" fill="#E74C3C" rx="3"/>
    <rect x="180" y="120" width="50" height="30" fill="#E74C3C" rx="3"/>
    <circle cx="85" cy="155" r="6" fill="#FFD700"/>
    <circle cx="145" cy="155" r="6" fill="#FFD700"/>
    <circle cx="205" cy="155" r="6" fill="#FFD700"/>
  </g>
  
  <!-- Decorative Circles -->
  <circle cx="75" cy="280" r="30" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.3"/>
  <circle cx="75" cy="280" r="20" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.2"/>
  
  <circle cx="225" cy="350" r="25" fill="none" stroke="#00CED1" stroke-width="2" opacity="0.3"/>
  <circle cx="225" cy="350" r="15" fill="none" stroke="#00CED1" stroke-width="1" opacity="0.2"/>
  
  <!-- Decorative Lines -->
  <line x1="30" y1="400" x2="270" y2="400" stroke="#00CED1" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="420" x2="270" y2="420" stroke="#00CED1" stroke-width="1" opacity="0.3"/>
  
  <!-- Small Icon/Badge -->
  <rect x="100" y="500" width="100" height="100" fill="none" stroke="#FFD700" stroke-width="2" rx="10" opacity="0.5"/>
  <text x="150" y="545" font-size="24" fill="#FFD700" text-anchor="middle" opacity="0.6">✓</text>
  <text x="150" y="585" font-size="12" fill="#FFD700" text-anchor="middle" opacity="0.6">Trusted</text>
  
  <!-- Geometric Pattern -->
  <polygon points="50,650 100,620 100,680" fill="none" stroke="#00CED1" stroke-width="1" opacity="0.3"/>
  <polygon points="150,650 200,620 200,680" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
  <polygon points="250,650 300,620 300,680" fill="none" stroke="#00CED1" stroke-width="1" opacity="0.3"/>
  
  <!-- Vertical Accent Line -->
  <line x1="10" y1="0" x2="10" y2="800" stroke="#FFD700" stroke-width="3" opacity="0.5"/>
</svg>