<svg viewBox="0 0 1200 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E0F6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4E8F7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="groundGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#90EE90;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7CCD7C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="350" fill="url(#skyGradient)"/>
  
  <!-- Sun -->
  <circle cx="1000" cy="80" r="50" fill="#FFD700" opacity="0.9"/>
  <circle cx="1000" cy="80" r="55" fill="#FFD700" opacity="0.3"/>
  
  <!-- Clouds -->
  <ellipse cx="150" cy="100" rx="60" ry="35" fill="white" opacity="0.7"/>
  <ellipse cx="200" cy="110" rx="80" ry="40" fill="white" opacity="0.7"/>
  <ellipse cx="100" cy="120" rx="50" ry="30" fill="white" opacity="0.6"/>
  
  <ellipse cx="600" cy="140" rx="70" ry="35" fill="white" opacity="0.6"/>
  <ellipse cx="660" cy="150" rx="90" ry="40" fill="white" opacity="0.6"/>
  
  <!-- Ground -->
  <rect y="350" width="1200" height="250" fill="url(#groundGradient)"/>
  
  <!-- Railway Tracks -->
  <rect x="0" y="400" width="1200" height="8" fill="#8B7355"/>
  <rect x="0" y="416" width="1200" height="3" fill="#666"/>
  
  <!-- Track ties -->
  <rect x="20" y="408" width="40" height="6" fill="#654321"/>
  <rect x="80" y="408" width="40" height="6" fill="#654321"/>
  <rect x="140" y="408" width="40" height="6" fill="#654321"/>
  <rect x="200" y="408" width="40" height="6" fill="#654321"/>
  <rect x="260" y="408" width="40" height="6" fill="#654321"/>
  <rect x="320" y="408" width="40" height="6" fill="#654321"/>
  <rect x="380" y="408" width="40" height="6" fill="#654321"/>
  <rect x="440" y="408" width="40" height="6" fill="#654321"/>
  <rect x="500" y="408" width="40" height="6" fill="#654321"/>
  <rect x="560" y="408" width="40" height="6" fill="#654321"/>
  <rect x="620" y="408" width="40" height="6" fill="#654321"/>
  <rect x="680" y="408" width="40" height="6" fill="#654321"/>
  <rect x="740" y="408" width="40" height="6" fill="#654321"/>
  <rect x="800" y="408" width="40" height="6" fill="#654321"/>
  <rect x="860" y="408" width="40" height="6" fill="#654321"/>
  <rect x="920" y="408" width="40" height="6" fill="#654321"/>
  <rect x="980" y="408" width="40" height="6" fill="#654321"/>
  <rect x="1040" y="408" width="40" height="6" fill="#654321"/>
  <rect x="1100" y="408" width="40" height="6" fill="#654321"/>
  
  <!-- Mountain in background -->
  <polygon points="0,350 200,120 400,350" fill="#8B7355" opacity="0.6"/>
  <polygon points="300,350 500,150 700,350" fill="#A0826D" opacity="0.6"/>
  <polygon points="850,350 1050,140 1200,350" fill="#9B8B7E" opacity="0.6"/>
  
  <!-- Trees -->
  <g id="tree">
    <rect x="-5" y="20" width="10" height="40" fill="#654321"/>
    <polygon points="0,-20 -30,20 30,20" fill="#228B22"/>
    <polygon points="0,-35 -35,5 35,5" fill="#2E8B57"/>
  </g>
  
  <use href="#tree" x="100" y="360" transform="scale(1.2)"/>
  <use href="#tree" x="950" y="370" transform="scale(1.1)"/>
  <use href="#tree" x="1100" y="360" transform="scale(1.3)"/>
  
  <!-- High-speed Modern Train -->
  <!-- Engine -->
  <g id="modernTrain">
    <!-- Locomotive -->
    <rect x="50" y="250" width="80" height="100" fill="#DC143C" rx="8"/>
    <polygon points="130,250 150,250 140,270" fill="#DC143C"/>
    <rect x="55" y="270" width="20" height="20" fill="#1E90FF"/>
    <rect x="80" y="270" width="20" height="20" fill="#1E90FF"/>
    
    <!-- Smoke stack -->
    <rect x="80" y="180" width="12" height="70" fill="#333"/>
    <circle cx="86" cy="170" r="10" fill="#999" opacity="0.5"/>
    <circle cx="82" cy="155" r="8" fill="#999" opacity="0.3"/>
    
    <!-- Cabin -->
    <rect x="130" y="250" width="45" height="100" fill="#DC143C" rx="5"/>
    <ellipse cx="152" cy="260" rx="12" ry="15" fill="#87CEEB"/>
    
    <!-- Front wheels -->
    <circle cx="70" cy="355" r="15" fill="#333"/>
    <circle cx="70" cy="355" r="11" fill="#555"/>
    <circle cx="100" cy="355" r="15" fill="#333"/>
    <circle cx="100" cy="355" r="11" fill="#555"/>
    
    <!-- Passenger Cars -->
    <rect x="180" y="255" width="75" height="95" fill="#FFD700" rx="4"/>
    <rect x="185" y="265" width="16" height="18" fill="#1E90FF"/>
    <rect x="210" y="265" width="16" height="18" fill="#1E90FF"/>
    <rect x="235" y="265" width="16" height="18" fill="#1E90FF"/>
    <circle cx="190" cy="355" r="14" fill="#333"/>
    <circle cx="190" cy="355" r="10" fill="#555"/>
    <circle cx="240" cy="355" r="14" fill="#333"/>
    <circle cx="240" cy="355" r="10" fill="#555"/>
    
    <rect x="265" y="255" width="75" height="95" fill="#FFD700" rx="4"/>
    <rect x="270" y="265" width="16" height="18" fill="#1E90FF"/>
    <rect x="295" y="265" width="16" height="18" fill="#1E90FF"/>
    <rect x="320" y="265" width="16" height="18" fill="#1E90FF"/>
    <circle cx="275" cy="355" r="14" fill="#333"/>
    <circle cx="275" cy="355" r="10" fill="#555"/>
    <circle cx="325" cy="355" r="14" fill="#333"/>
    <circle cx="325" cy="355" r="10" fill="#555"/>
    
    <!-- First Class Car -->
    <rect x="350" y="255" width="75" height="95" fill="#FF6347" rx="4"/>
    <rect x="355" y="265" width="18" height="18" fill="#1E90FF"/>
    <rect x="380" y="265" width="18" height="18" fill="#1E90FF"/>
    <rect x="405" y="265" width="18" height="18" fill="#1E90FF"/>
    <circle cx="360" cy="355" r="14" fill="#333"/>
    <circle cx="360" cy="355" r="10" fill="#555"/>
    <circle cx="410" cy="355" r="14" fill="#333"/>
    <circle cx="410" cy="355" r="10" fill="#555"/>
  </g>
  
  <!-- Birds in sky -->
  <g id="bird">
    <path d="M 0,0 Q -3,2 -5,0 Q -3,-2 0,0 M 5,0 Q 3,2 1,0 Q 3,-2 5,0" stroke="#333" stroke-width="0.5" fill="none"/>
  </g>
  <use href="#bird" x="300" y="100" transform="scale(2)"/>
  <use href="#bird" x="500" y="120" transform="scale(1.8)"/>
  <use href="#bird" x="800" y="110" transform="scale(2.2)"/>
</svg>