<svg viewBox="0 0 300 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Right Side Decorative Panel -->
  <defs>
    <linearGradient id="rightGrad" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="800" fill="url(#rightGrad)"/>
  
  <!-- Compass Rose -->
  <circle cx="150" cy="100" r="40" fill="none" stroke="#00CED1" stroke-width="1.5" opacity="0.4"/>
  <circle cx="150" cy="100" r="30" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.3"/>
  <line x1="150" y1="60" x2="150" y2="30" stroke="#00CED1" stroke-width="2" opacity="0.6"/>
  <line x1="150" y1="140" x2="150" y2="170" stroke="#00CED1" stroke-width="1" opacity="0.4"/>
  <line x1="110" y1="100" x2="80" y2="100" stroke="#00CED1" stroke-width="1" opacity="0.4"/>
  <line x1="190" y1="100" x2="220" y2="100" stroke="#00CED1" stroke-width="1" opacity="0.4"/>
  
  <!-- Destination Markers -->
  <g opacity="0.5">
    <circle cx="80" cy="250" r="8" fill="none" stroke="#FFD700" stroke-width="2"/>
    <text x="80" y="285" font-size="10" fill="#FFD700" text-anchor="middle">Delhi</text>
  </g>
  
  <g opacity="0.5">
    <circle cx="200" cy="320" r="8" fill="none" stroke="#00CED1" stroke-width="2"/>
    <text x="200" y="355" font-size="10" fill="#00CED1" text-anchor="middle">Mumbai</text>
  </g>
  
  <g opacity="0.5">
    <circle cx="150" cy="400" r="8" fill="none" stroke="#E74C3C" stroke-width="2"/>
    <text x="150" y="435" font-size="10" fill="#E74C3C" text-anchor="middle">Bangalore</text>
  </g>
  
  <!-- Connecting Lines -->
  <line x1="80" y1="258" x2="150" y2="408" stroke="#FFD700" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  <line x1="200" y1="328" x2="150" y2="408" stroke="#00CED1" stroke-width="1" stroke-dasharray="5,5" opacity="0.3"/>
  
  <!-- Ticket Icon -->
  <rect x="60" y="500" width="180" height="80" fill="none" stroke="#FFD700" stroke-width="2" rx="5" opacity="0.4"/>
  <line x1="150" y1="500" x2="150" y2="580" stroke="#FFD700" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="90" y="535" font-size="12" fill="#FFD700" opacity="0.5">PNR</text>
  <text x="200" y="535" font-size="10" fill="#FFD700" opacity="0.5">123456</text>
  <text x="90" y="560" font-size="10" fill="#FFD700" opacity="0.5">Seat: S45</text>
  
  <!-- Journey Progress -->
  <circle cx="60" cy="680" r="8" fill="#28A745" opacity="0.6"/>
  <line x1="68" y1="680" x2="232" y2="680" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <circle cx="240" cy="680" r="8" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6"/>
  
  <text x="60" y="710" font-size="9" fill="#FFD700" text-anchor="middle" opacity="0.6">Boarded</text>
  <text x="240" y="710" font-size="9" fill="#FFD700" text-anchor="middle" opacity="0.6">Arrival</text>
  
  <!-- Vertical Accent Line -->
  <line x1="290" y1="0" x2="290" y2="800" stroke="#00CED1" stroke-width="3" opacity="0.5"/>
</svg>