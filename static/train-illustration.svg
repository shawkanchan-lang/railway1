<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Track -->
  <line x1="0" y1="150" x2="400" y2="150" stroke="#8B7355" stroke-width="8"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#8B7355" stroke-width="2"/>
  <circle cx="40" cy="165" r="8" fill="#333"/>
  <circle cx="100" cy="165" r="8" fill="#333"/>
  <circle cx="160" cy="165" r="8" fill="#333"/>
  <circle cx="220" cy="165" r="8" fill="#333"/>
  <circle cx="280" cy="165" r="8" fill="#333"/>
  <circle cx="340" cy="165" r="8" fill="#333"/>
  
  <!-- Train Engine -->
  <rect x="20" y="100" width="40" height="45" fill="#DC143C" rx="5"/>
  <circle cx="35" cy="155" r="12" fill="#333"/>
  <circle cx="35" cy="155" r="8" fill="#666"/>
  
  <!-- Smoke Stack -->
  <rect x="30" y="70" width="8" height="30" fill="#333"/>
  <circle cx="34" cy="60" r="6" fill="#999" opacity="0.6"/>
  <circle cx="32" cy="50" r="5" fill="#999" opacity="0.4"/>
  
  <!-- Cabin -->
  <rect x="60" y="100" width="35" height="45" fill="#DC143C" rx="3"/>
  <rect x="65" y="110" width="12" height="12" fill="#87CEEB"/>
  <rect x="80" y="110" width="12" height="12" fill="#87CEEB"/>
  
  <!-- Cars -->
  <rect x="100" y="105" width="50" height="40" fill="#FFD700" rx="3"/>
  <circle cx="110" cy="155" r="10" fill="#333"/>
  <circle cx="110" cy="155" r="6" fill="#666"/>
  <circle cx="140" cy="155" r="10" fill="#333"/>
  <circle cx="140" cy="155" r="6" fill="#666"/>
  <rect x="108" y="115" width="8" height="10" fill="#87CEEB"/>
  <rect x="122" y="115" width="8" height="10" fill="#87CEEB"/>
  
  <rect x="155" y="105" width="50" height="40" fill="#FFD700" rx="3"/>
  <circle cx="165" cy="155" r="10" fill="#333"/>
  <circle cx="165" cy="155" r="6" fill="#666"/>
  <circle cx="195" cy="155" r="10" fill="#333"/>
  <circle cx="195" cy="155" r="6" fill="#666"/>
  <rect x="163" y="115" width="8" height="10" fill="#87CEEB"/>
  <rect x="177" y="115" width="8" height="10" fill="#87CEEB"/>
  
  <!-- Passenger Car -->
  <rect x="210" y="105" width="50" height="40" fill="#FF6347" rx="3"/>
  <circle cx="220" cy="155" r="10" fill="#333"/>
  <circle cx="220" cy="155" r="6" fill="#666"/>
  <circle cx="250" cy="155" r="10" fill="#333"/>
  <circle cx="250" cy="155" r="6" fill="#666"/>
  <rect x="218" y="115" width="8" height="10" fill="#87CEEB"/>
  <rect x="232" y="115" width="8" height="10" fill="#87CEEB"/>
  
  <!-- Sun -->
  <circle cx="370" cy="30" r="20" fill="#FFD700"/>
  <line x1="370" y1="0" x2="370" y2="10" stroke="#FFD700" stroke-width="2"/>
  <line x1="370" y1="50" x2="370" y2="60" stroke="#FFD700" stroke-width="2"/>
  <line x1="390" y1="30" x2="400" y2="30" stroke="#FFD700" stroke-width="2"/>
  <line x1="350" y1="30" x2="340" y2="30" stroke="#FFD700" stroke-width="2"/>
</svg>